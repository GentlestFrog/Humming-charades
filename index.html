<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shuffle">
<meta name="theme-color" content="#ffffff">
<title>Shuffle</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f5;
    --bg3: #ebebeb;
    --text: #111111;
    --text2: #666666;
    --text3: #999999;
    --border: rgba(0,0,0,0.1);
    --accent: #6C47FF;
    --accent-bg: #f0ecff;
    --radius: 14px;
    --radius-sm: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111111;
      --bg2: #1e1e1e;
      --bg3: #2a2a2a;
      --text: #f0f0f0;
      --text2: #999999;
      --text3: #666666;
      --border: rgba(255,255,255,0.1);
      --accent: #8b6fff;
      --accent-bg: #1e1a33;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }
  
  .header { padding: 56px 20px 0; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header p { font-size: 14px; color: var(--text2); margin-top: 4px; }

  .tab-bar { display: flex; gap: 6px; padding: 16px 20px 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 9px 0; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .tab.active { background: var(--accent-bg); color: var(--accent); }

  .content { flex: 1; padding: 20px 20px calc(20px + var(--safe-bottom)); overflow-y: auto; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* Randomize */
  .result-card { background: var(--accent-bg); border-radius: var(--radius); padding: 32px 20px; text-align: center; margin-bottom: 16px; min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .result-icon { font-size: 32px; margin-bottom: 4px; }
  .result-song { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .result-artist { font-size: 16px; color: var(--text2); }
  .result-list-tag { font-size: 12px; color: var(--accent); background: rgba(108,71,255,0.12); padding: 3px 10px; border-radius: 99px; margin-top: 4px; }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .pill { padding: 7px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .btn-primary { width: 100%; padding: 16px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:active { opacity: 0.8; }

  /* Add song */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; padding: 13px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 16px; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--bg); }

  .btn-add { width: 100%; padding: 14px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 28px; }
  .btn-add:active { opacity: 0.8; }

  .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; }
  .song-list { display: flex; flex-direction: column; gap: 8px; }
  .song-item { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .song-meta { flex: 1; min-width: 0; }
  .song-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-subtitle { font-size: 13px; color: var(--text2); margin-top: 1px; }
  .song-list-tag { font-size: 11px; color: var(--accent); margin-top: 2px; }
  .btn-del { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; flex-shrink: 0; }
  .empty { text-align: center; color: var(--text3); font-size: 14px; padding: 32px 0; }

  /* Lists */
  .new-list-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .new-list-row input { flex: 1; padding: 13px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 16px; outline: none; }
  .new-list-row input:focus { border-color: var(--accent); }
  .btn-create { padding: 0 18px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }

  .list-card { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .list-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .list-card-name { font-size: 16px; font-weight: 700; }
  .list-card-count { font-size: 13px; color: var(--text2); }
  .list-songs { font-size: 13px; color: var(--text2); }
  .list-song-row { padding: 5px 0; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
  .btn-del-list { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; }

  .toast { position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 99px; font-size: 14px; font-weight: 500; transition: transform 0.3s; z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>🎵 Shuffle</h1>
  <p>Your personal song randomizer</p>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('randomize')">Shuffle</button>
  <button class="tab" onclick="switchTab('add')">Add song</button>
  <button class="tab" onclick="switchTab('lists')">My lists</button>
</div>

<div class="content">
  <div id="screen-randomize" class="screen active">
    <div class="result-card" id="result-card">
      <div class="result-icon">🎲</div>
      <div class="result-song" id="res-song">Ready to shuffle</div>
      <div class="result-artist" id="res-artist">Pick a list and tap shuffle</div>
    </div>
    <div class="filter-row" id="filter-pills"></div>
    <button class="btn-primary" onclick="randomize()">Shuffle ↓</button>
  </div>

  <div id="screen-add" class="screen">
    <div class="form-group">
      <label>Song title</label>
      <input type="text" id="inp-song" placeholder="e.g. Bohemian Rhapsody" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Artist</label>
      <input type="text" id="inp-artist" placeholder="e.g. Queen" autocomplete="off">
    </div>
    <div class="form-group">
      <label>List</label>
      <select id="inp-list"></select>
    </div>
    <button class="btn-add" onclick="addSong()">Add song</button>
    <div class="section-label">All songs</div>
    <div class="song-list" id="all-songs"></div>
  </div>

  <div id="screen-lists" class="screen">
    <div class="new-list-row">
      <input type="text" id="inp-newlist" placeholder="New list name…" autocomplete="off">
      <button class="btn-create" onclick="addList()">Create</button>
    </div>
    <div id="lists-view"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'shuffle_v1';
let state = {
  lists: ['Favorites', 'Road trip', 'Workout'],
  songs: [
    { song: 'Bohemian Rhapsody', artist: 'Queen', list: 'Favorites' },
    { song: 'Mr. Brightside', artist: 'The Killers', list: 'Road trip' },
    { song: 'Blinding Lights', artist: 'The Weeknd', list: 'Workout' },
    { song: 'Africa', artist: 'Toto', list: 'Road trip' },
    { song: "Don't Stop Me Now", artist: 'Queen', list: 'Favorites' },
  ],
  filter: [],
};

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function load() { try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = JSON.parse(s); } catch(e) {} }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['randomize','add','lists'][i] === tab));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  if (tab === 'add') renderAdd();
  if (tab === 'lists') renderLists();
  if (tab === 'randomize') renderPills();
}

function renderPills() {
  const c = document.getElementById('filter-pills');
  c.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'pill' + (state.filter.length === 0 ? ' active' : '');
  all.textContent = 'All';
  all.onclick = () => { state.filter = []; renderPills(); };
  c.appendChild(all);
  state.lists.forEach(l => {
    const p = document.createElement('button');
    p.className = 'pill' + (state.filter.includes(l) ? ' active' : '');
    p.textContent = l;
    p.onclick = () => {
      const i = state.filter.indexOf(l);
      i > -1 ? state.filter.splice(i, 1) : state.filter.push(l);
      renderPills();
    };
    c.appendChild(p);
  });
}

function randomize() {
  const pool = state.songs.filter(s => state.filter.length === 0 || state.filter.includes(s.list));
  if (!pool.length) { toast('No songs in this list yet!'); return; }
  const pick = pool[Math.floor(Math.random() * pool.length)];
  const card = document.getElementById('result-card');
  card.style.transition = 'opacity 0.15s';
  card.style.opacity = '0';
  setTimeout(() => {
    document.getElementById('res-song').textContent = pick.song;
    document.getElementById('res-artist').textContent = pick.artist;
    let tag = card.querySelector('.result-list-tag');
    if (!tag) { tag = document.createElement('div'); tag.className = 'result-list-tag'; card.appendChild(tag); }
    tag.textContent = pick.list;
    card.querySelector('.result-icon').textContent = '🎵';
    card.style.opacity = '1';
  }, 150);
}

function addSong() {
  const song = document.getElementById('inp-song').value.trim();
  const artist = document.getElementById('inp-artist').value.trim();
  const list = document.getElementById('inp-list').value;
  if (!song || !artist) { toast('Fill in song and artist'); return; }
  state.songs.push({ song, artist, list });
  save();
  document.getElementById('inp-song').value = '';
  document.getElementById('inp-artist').value = '';
  toast('Song added!');
  renderAdd();
}

function deleteSong(i) {
  state.songs.splice(i, 1);
  save();
  renderAdd();
  toast('Removed');
}

function renderAdd() {
  const sel = document.getElementById('inp-list');
  const cur = sel.value;
  sel.innerHTML = state.lists.map(l => `<option value="${l}">${l}</option>`).join('');
  if (state.lists.includes(cur)) sel.value = cur;
  const c = document.getElementById('all-songs');
  if (!state.songs.length) { c.innerHTML = '<div class="empty">No songs yet — add one above!</div>'; return; }
  c.innerHTML = state.songs.map((s, i) => `
    <div class="song-item">
      <div class="song-meta">
        <div class="song-title">${esc(s.song)}</div>
        <div class="song-subtitle">${esc(s.artist)}</div>
        <div class="song-list-tag">${esc(s.list)}</div>
      </div>
      <button class="btn-del" onclick="deleteSong(${i})" aria-label="Delete">✕</button>
    </div>`).join('');
}

function addList() {
  const inp = document.getElementById('inp-newlist');
  const name = inp.value.trim();
  if (!name) return;
  if (state.lists.includes(name)) { toast('List already exists'); return; }
  state.lists.push(name);
  save();
  inp.value = '';
  toast(`"${name}" created`);
  renderLists();
  renderPills();
}

function deleteList(name) {
  const hasSongs = state.songs.some(s => s.list === name);
  if (hasSongs) { toast('Remove songs from this list first'); return; }
  state.lists = state.lists.filter(l => l !== name);
  state.filter = state.filter.filter(l => l !== name);
  save();
  renderLists();
  renderPills();
  toast('List removed');
}

function renderLists() {
  const c = document.getElementById('lists-view');
  if (!state.lists.length) { c.innerHTML = '<div class="empty">No lists yet</div>'; return; }
  c.innerHTML = state.lists.map(l => {
    const songs = state.songs.filter(s => s.list === l);
    const rows = songs.length ? songs.map(s => `<div class="list-song-row"><span>${esc(s.song)}</span><span style="color:var(--text3)">${esc(s.artist)}</span></div>`).join('') : '<div style="padding:6px 0;font-size:13px;color:var(--text3)">Empty</div>';
    return `<div class="list-card">
      <div class="list-card-header">
        <div class="list-card-name">${esc(l)}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="list-card-count">${songs.length} song${songs.length!==1?'s':''}</span>
          <button class="btn-del-list" onclick="deleteList('${esc(l)}')" aria-label="Delete list">✕</button>
        </div>
      </div>
      <div class="list-songs">${rows}</div>
    </div>`;
  }).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

load();
renderPills();
</script>
</body>
</html>
